name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'code/cli/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

permissions:
  contents: write

# Run all JavaScript actions on Node.js 24 (opt in ahead of the GitHub default).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.version }}
      should_release: ${{ steps.v.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        shell: bash
        run: |
          version=$(grep -oP "linkedinCliVersion = '\K[^']+" code/cli/lib/src/version.dart)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          if git rev-parse "v$version" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            echo "Tag v$version already exists; nothing to release."
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            echo "Will release v$version."
          fi

  build:
    needs: prepare
    if: needs.prepare.outputs.should_release == 'true'
    strategy:
      matrix:
        include:
          - os: windows-latest
            asset: post-publisher-windows-x64.zip
          - os: ubuntu-latest
            asset: post-publisher-linux-x64.tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1

      - name: Install dependencies
        working-directory: code/cli
        run: dart pub get

      - name: Build and package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        working-directory: code/cli
        run: |
          ./scripts/build.ps1
          Compress-Archive -Path build/* -DestinationPath ${{ matrix.asset }} -Force

      - name: Build and package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        working-directory: code/cli
        run: |
          chmod +x scripts/build.sh
          ./scripts/build.sh
          tar -czf ${{ matrix.asset }} -C build .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: code/cli/${{ matrix.asset }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: v${{ needs.prepare.outputs.version }}
          generate_release_notes: true
          files: dist/**
