name: Deploy Pages

on:
  push:
    branches:
      - main
    paths:
      - 'code/site/**'
      - 'code/cli/scripts/install.ps1'
      - 'code/cli/scripts/install.sh'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      - name: Bundle install scripts into the site
        run: |
          cp code/cli/scripts/install.ps1 code/site/install.ps1
          cp code/cli/scripts/install.sh code/site/install.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: code/site

      - id: deployment
        uses: actions/deploy-pages@v4